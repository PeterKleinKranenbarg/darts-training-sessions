<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Darts Dashboard</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #1e1e1e;
    color: white;
}

#controls {
    margin: 20px;
}

button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

button.active {
    background: orange;
}

svg {
    background: #222;
    border-radius: 50%;
}

#details {
    margin-top: 20px;
    background: #333;
    padding: 15px;
    border-radius: 10px;
    display: inline-block;
    text-align: left;
}
#layout {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 20px;
    margin-top: 20px;
}

#summary {
    margin-top: 30px;
    background: #333;
    padding: 20px;
    border-radius: 10px;
    display: inline-block;
    text-align: left;
}

#dateControls {
    margin-bottom: 10px;
}
#dartbotContainer {
    display: flex;
    align-items: flex-start;
    gap: 20px;
}

#dartboard {
    width: 300px;
    height: 300px;
}

</style>
</head>
<body>
<h1>Darts Accuracy Dashboard</h1>


<!-- View toggle-->
<div id="controls">
    <button onclick="switchView('dashboard')">Dashboard</button>
    <button onclick="switchView('training')">New Training</button>
</div>

<div id="dashboardView">
    <h2>Dashboard</h2>
    
    <!-- DATE FILTER (always visible) -->
    <div id="dateControls">
        <input type="date" id="fromDate">
        <input type="date" id="toDate">
        <button onclick="applyFilter()">Apply</button>
    </div>

        
    <!-- MODE TOGGLE -->
    <div id="controls">
        <button onclick="setMode('single')" id="singleBtn">Single</button>
        <button onclick="setMode('double')" id="doubleBtn">Double</button>
        <button onclick="setMode('triple')" id="tripleBtn">Triple</button>
        <button onclick="setMode('dartbot')" id="dartbotBtn">Dartbot</button>
        <p id="modeDescription"></p>
    </div>


    <!-- MAIN LAYOUT -->
    <div id="layout">
        <svg id="board" width="500" height="500" viewBox="-250 -250 500 500"></svg>
        <div id="details">Click a segment to see details</div>
    </div>

    <!-- DARTBOT SECTION -->
    <div id="dartbotSection">
        <h2>Dartbot Stats</h2>
        <p id="dartbotDescription"></p>
        <div id="dartbotStats"></div>
    </div>

    <!-- Round the board section-->
    <div id="roundTheBoardSection">
        <h2>Round the Board Summary</h2>
        <p id="roundTheBoardDescription"></p>
        <div id="roundTheBoardStats"></div>
    </div>

    <!-- 50-OUT SECTION -->
    <div id="summary">
        <h2>50-Out Summary</h2>
        <p id="fiftyOutDescription"></p>
        <div id="fiftyOutStats"></div>
    </div>

</div>

<div id="trainingView" style="display:none;">
    <!-- INPUT SECTION -->
    <div id="inputSection" style="margin-top:40px; background:#333; padding:20px; border-radius:10px; display:inline-block;">
        <h2>New Training Session</h2>

        <label>Training type:</label><br>
        <select id="trainingType">
            <option value="single_training">Single</option>
            <option value="double_training">Double</option>
            <option value="triple_training">Triple</option>
            <option value="dartbot">Dartbot</option>
            <option value="50-out">50-Out</option>
            <option value="round-the-board">Round the Board</option>
        </select>

        <div id="dynamicInputs" style="margin-top:15px;"></div>

        <button onclick="addTrainingToSession()">Save Training</button>
    </div>
    <div id="sessionList" style="margin-top:20px; background:#333; padding:15px; border-radius:10px; text-align:left;">
        <h3>Current Session</h3>
        <div id="sessionItems"></div>
    </div>
    <div id="trainingPreview"></div>
    <button onclick="createSessionPR()">Save Session (Create PR)</button>
</div>

<script>
let currentView = "dashboard"; // or "training"
let data = {};
let currentSession = {
    trainings: []
};

const savedSession = localStorage.getItem("currentSession");
if (savedSession) {
    currentSession = JSON.parse(savedSession);
}
renderSessionList();

function persistSession() {
    localStorage.setItem("currentSession", JSON.stringify(currentSession));
}

function addExercise(exerciseData) {
    currentSession.exercises.push(exerciseData);

    renderCurrentSession();
}

let rawSessions = [];

function removeTraining(index) {
    currentSession.trainings.splice(index, 1);
    persistSession();
    renderSessionList();
}

function renderSessionList() {
    const container = document.getElementById("sessionItems");
    container.innerHTML = "";

    currentSession.trainings.forEach((t, index) => {
        const div = document.createElement("div");
        div.style.borderBottom = "1px solid #555";
        div.style.padding = "8px";
        div.style.display = "flex";
        div.style.justifyContent = "space-between";
        div.style.alignItems = "center";

        const text = document.createElement("span");
        text.innerText = `${index + 1}. ${t.training_type} (${new Date(t.date).toLocaleString()})`;

        const removeBtn = document.createElement("button");
        removeBtn.innerText = "Remove";
        removeBtn.style.marginLeft = "10px";

        removeBtn.onclick = () => removeTraining(index);

        div.appendChild(text);
        div.appendChild(removeBtn);

        container.appendChild(div);
    });
}

async function createSessionPR() {
    if (currentSession.trainings.length === 0) {
        alert("No trainings in session");
        return;
    }

    const response = await fetch("http://192.168.1.xxx:3000/save-session", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(currentSession)
    });

    const result = await response.json();

    alert("Session saved! PR created.");

    if (result.pr_url) {
        window.open(result.pr_url, "_blank");
    }

    // ✅ Clear session in memory
    currentSession = { trainings: [] };

    // ✅ Clear localStorage
    localStorage.removeItem("currentSession");

    renderSessionList();
}

function renderCurrentSession() {
    const container = document.getElementById("trainingPreview");
    container.innerHTML = "";

    currentSession.exercises.forEach((ex, index) => {
        const div = document.createElement("div");
        div.innerText = `Exercise ${index + 1}: ${JSON.stringify(ex)}`;
        container.appendChild(div);
    });
}

function switchView(view) {
    currentView = view;

    document.getElementById("dashboardView").style.display = view === "dashboard" ? "block" : "none";
    document.getElementById("trainingView").style.display = view === "training" ? "block" : "none";
}

async function loadSessions() {
    const index = await fetch("sessions/index.json").then(r => r.json());

    const promises = index.map(async file => {
        const json = await fetch("sessions/" + file).then(r => r.json());
        return Array.isArray(json) ? json : [json];
    });

    const nested = await Promise.all(promises);

    // 🔥 merge everything
    rawSessions = [...nested.flat()];

    applyFilter();
}

document.getElementById("trainingType").addEventListener("change", renderInputs);

            Target number: <input id="single" type="number"><br>
            Single hits: <input id="single_hits" type="number"><br>
            Double hits: <input id="double_hits" type="number"><br>
            Triple hits: <input id="triple_hits" type="number"><br>
            Next hits: <input id="next_single" type="number"><br>
            Previous hits: <input id="previous_single" type="number"><br>
            Outside: <input id="outside_hits" type="number"><br>
            Other: <input id="other" type="number"><br>
        `;
    }

    if (type === "double_training") {
        container.innerHTML = `
            Target number: <input id="double" type="number"><br>
            Double hits: <input id="double_hits" type="number"><br>
            Single hits: <input id="single_hits" type="number"><br>
            Next doubles: <input id="next_double" type="number"><br>
            Previous doubles: <input id="previous_double" type="number"><br>
            Outside: <input id="outside_hits" type="number"><br>
            Other: <input id="other" type="number"><br>
        `;
    }

    if (type === "triple_training") {
        container.innerHTML = `
            Target number: <input id="triple" type="number"><br>
            Triple hits: <input id="triple_hits" type="number"><br>
            Double hits: <input id="double_hits" type="number"><br>
            Single hits: <input id="single_hits" type="number"><br>
            Next triple: <input id="next_triple" type="number"><br>
            Previous triple: <input id="previous_triple" type="number"><br>
            Next single: <input id="next_single" type="number"><br>
            Previous single: <input id="previous_single" type="number"><br>
            Other score total: <input id="sum_other" type="number"><br>
            Other hits: <input id="other" type="number"><br>
        `;
    }

    if (type === "50-out") {
        container.innerHTML = `
            Darts used (comma separated, 0 = fail):<br>
            <input id="darts_used" type="text" placeholder="3,4,5,0">
        `;
    }

    if (type === "round-the-board") {
        container.innerHTML = `
            Darts up to bull: <input id="darts_up_to_bullseye" type="number"><br>
            Darts at bull: <input id="darts_thrown_at_bullseye" type="number"><br>
            Darts in single bull: <input id="darts_thrown_in_single_bull" type="number"><br>
        `;
    }

    if (type === "dartbot") {
        container.innerHTML = `
            3-dart average: <input id="avg" type="number"><br>
            First 9 average: <input id="first9" type="number"><br>
            Highest score: <input id="highest_score" type="number"><br>
            Finishes (comma separated): <input id="finishes" type="text"><br>
            Won legs darts (comma separated): <input id="won_darts" type="text"><br>
            Lost legs: <input id="lost_legs" type="number"><br>
        `;
    }
}

function addTrainingToSession() {
    const type = document.getElementById("trainingType").value;

    let session = {
        date: new Date().toISOString().split("T")[0],
        training_type: type
    };

    const getVal = id => {
        const el = document.getElementById(id);
        return el ? Number(el.value) || 0 : 0;
    };

    if (type === "single_training") {
        session.single = getVal("single");
        session.single_hits = getVal("single_hits");
        session.double_hits = getVal("double_hits");
        session.triple_hits = getVal("triple_hits");
        session.next_single = getVal("next_single");
        session.previous_single = getVal("previous_single");
        session.outside_hits = getVal("outside_hits");
        session.other = getVal("other");
    }

    if (type === "double_training") {
        session.double = getVal("double");
        session.double_hits = getVal("double_hits");
        session.single_hits = getVal("single_hits");
        session.next_double = getVal("next_double");
        session.previous_double = getVal("previous_double");
        session.outside_hits = getVal("outside_hits");
        session.other = getVal("other");
    }

    if (type === "triple_training") {
        session.triple = getVal("triple");
        session.triple_hits = getVal("triple_hits");
        session.double_hits = getVal("double_hits");
        session.single_hits = getVal("single_hits");
        session.next_triple = getVal("next_triple");
        session.previous_triple = getVal("previous_triple");
        session.next_single = getVal("next_single");
        session.previous_single = getVal("previous_single");
        session.sum_other = getVal("sum_other");
        session.other = getVal("other");
    }

    if (type === "50-out") {
        session.darts_used = document.getElementById("darts_used").value
            .split(",")
            .map(x => Number(x.trim()) || 0);
    }

    if (type === "round-the-board") {
        session.darts_up_to_bullseye = getVal("darts_up_to_bullseye");
        session.darts_thrown_at_bullseye = getVal("darts_thrown_at_bullseye");
        session.darts_thrown_in_single_bull = getVal("darts_thrown_in_single_bull");
    }

    if (type === "dartbot") {
        session["3_dart_average"] = getVal("avg");
        session["first_9_average"] = getVal("first9");
        session.highest_score = getVal("highest_score");
        session.finishes = document.getElementById("finishes").value.split(",").map(x => Number(x.trim()) || 0);
        session.won_legs_number_of_darts = document.getElementById("won_darts").value.split(",").map(x => Number(x.trim()) || 0);
        session.lost_legs = getVal("lost_legs");
    }

    // ✅ Add to session
    currentSession.trainings.push(session);
    persistSession();

    // ✅ Update UI list
    renderSessionList();

    // Optional: clear inputs
    document.querySelectorAll("#dynamicInputs input").forEach(input => input.value = "");
}

function applyFilter() {
    const fromInput = document.getElementById("fromDate");
    const toInput = document.getElementById("toDate");

    if (!fromInput.value) fromInput.value = "2026-01-01";
    if (!toInput.value) toInput.value = new Date().toISOString().split("T")[0];

    const from = new Date(fromInput.value);
    const to = new Date(toInput.value);

    const filtered = rawSessions.filter(s => {
        const d = new Date(s.date);
        return d >= from && d <= to;
    });

    // filter for dartboard ONLY
    const boardFiltered = filtered.filter(s => {
        if (mode === "single") return s.training_type === "single_training";
        if (mode === "double") return s.training_type === "double_training";
        if (mode === "triple") return s.training_type === "triple_training";
        if (mode === "dartbot") return s.training_type === "dartbot";
        return false;
    });

    data = computeStats(boardFiltered);
    // attach dartbot stats globally
    const normalized = filtered.map(normalizeSession);
    const botStats = computeDartbotStats(normalized);

    data.dartbot = botStats?.doubleResults || {};

    drawBoard();
    renderSummary(filtered);
}

function renderSummary(sessions) {
    const normalizedSessions = sessions.map(normalizeSession);

    const botStats = computeDartbotStats(normalizedSessions);
    const outStats = compute50OutStats(normalizedSessions);
    const roundStats = computeRoundTheBoardStats(normalizedSessions);

    // ✅ Dartbot stats text
    let botHtml = "";

    if (botStats) {
        botHtml += `
            <p><strong>Average 3-dart average:</strong> ${botStats.averageAverage.toFixed(2)}</p>
            <p><strong>Average first 9 average:</strong> ${botStats.averageFirst9.toFixed(2)}</p>
            <p><strong>Highest 3-dart average:</strong> ${botStats.highestAverage.toFixed(2)}</p>
            <p><strong>Highest first 9 average:</strong> ${botStats.highestFirst9.toFixed(2)}</p>
            <p><strong>Highest score:</strong> ${botStats.highestScore}</p>
            <p><strong>Highest finish:</strong> ${botStats.highestFinish}</p>
            <p><strong>Average darts per won leg:</strong> ${botStats.avgDartsPerLeg?.toFixed(2)}</p>
            <p><strong>Fastest leg:</strong> ${botStats.minDartsPerLeg} darts</p>
        `;
    } else {
        botHtml = "<p>No dartbot data</p>";
    }

    document.getElementById("dartbotStats").innerHTML = botHtml;


    // ✅ 50-out stats
    let outHtml = "";

    if (outStats && Object.keys(outStats.counts).length > 0) {
        Object.keys(outStats.counts)
            .sort((a, b) => {
                if (a === "not_finished") return 1;
                if (b === "not_finished") return -1;
                return a - b;
            })
            .forEach(k => {
                const count = outStats.counts[k];
                const pct = outStats.percentages[k];

                if (k === "not_finished") {
                    outHtml += `<p><strong>Not finished:</strong> ${count} (${pct.toFixed(1)}%)</p>`;
                } else {
                    outHtml += `<p><strong>${k} darts:</strong> ${count} (${pct.toFixed(1)}%)</p>`;
                }
            });
    } else {
        outHtml = "<p>No 50-out data</p>";
    }

    document.getElementById("fiftyOutStats").innerHTML = outHtml;

    let roundHtml = "";

    if (roundStats.count > 0) {
        roundHtml += `
            <p><strong>Sessions:</strong> ${roundStats.count}</p>

            <p><strong>Avg darts up to bullseye:</strong> ${roundStats.avgUpToBull.toFixed(2)}</p>
            <p><strong>Min darts up to bullseye:</strong> ${roundStats.minUpToBull}</p>

            <p><strong>Avg darts at bullseye:</strong> ${roundStats.avgBull.toFixed(2)}</p>
            <p><strong>Min darts at bullseye:</strong> ${roundStats.minBull}</p>

            <p><strong>Avg total darts:</strong> ${roundStats.avgTotal.toFixed(2)}</p>
            <p><strong>Min total darts:</strong> ${roundStats.minTotal}</p>

            <p><strong>Avg single bull %:</strong> ${roundStats.avgSingleBullPct !== null ? roundStats.avgSingleBullPct.toFixed(2) + "%" : "N/A"}</p>
        `;
    } else {
        roundHtml = "<p>No round-the-board data</p>";
    }

    document.getElementById("roundTheBoardStats").innerHTML = roundHtml;
    updateSectionDescriptions();
}

const numbers = [20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];

const boardOrder = [20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];

function getNextNumber(num) {
    const i = boardOrder.indexOf(num);
    return boardOrder[(i + 1) % boardOrder.length];
}

function getPreviousNumber(num) {
    const i = boardOrder.indexOf(num);
    return boardOrder[(i - 1 + boardOrder.length) % boardOrder.length];
}

function getNeighbors(num) {
    const i = boardOrder.indexOf(num);
    return {
        next: boardOrder[(i + 1) % 20],
        prev: boardOrder[(i - 1 + 20) % 20]
    };
}

function computeTripleSessionScore(s) {
    const num = s.number;

    const nextNum = getNextNumber(num);
    const prevNum = getPreviousNumber(num);

    let score = 0;

    // Main target hits
    score += (s.hits.triple || 0) * (3 * num);
    score += (s.hits.double || 0) * (2 * num);
    score += (s.hits.single || 0) * (1 * num);

    // Neighbor triples
    score += (s.scores.next_triple || 0) * (3 * nextNum);
    score += (s.scores.prev_triple || 0) * (3 * prevNum);

    // Neighbor singles
    score += (s.scores.next_single || 0) * (1 * nextNum);
    score += (s.scores.prev_single || 0) * (1 * prevNum);

    // Other + misc
    score += s.scores.other_total_score || 0;

    return score;
}

function normalizeSession(s) {
    const type = s.training_type;

    if (type === "triple_training") {
        return {
            number: s.triple,
            type: "triple",
            hits: {
                single: s.single_hits || 0,
                double: s.double_hits || 0,
                triple: s.triple_hits || 0,
                next: s.next_single + s.next_triple,
                prev: s.previous_single + s.previous_triple,
                other: s.other || 0
            },
            darts:
                (s.triple_hits || 0) +
                (s.double_hits || 0) +
                (s.single_hits || 0) +
                (s.next_triple || 0) +
                (s.previous_triple || 0) +
                (s.next_single || 0) +
                (s.previous_single || 0) +
                (s.other || 0),
            scores: {
                next_single: s.next_single,
                next_triple: s.next_triple,
                prev_single: s.previous_single,
                prev_triple: s.previous_triple,
                other_total_score: s.sum_other
            }
        };
    }

    if (type === "double_training") {
        return {
            number: s.double,
            type: "double",
            hits: {
                single: s.single_hits || 0,
                double: s.double_hits || 0,
                triple: 0,
                next: s.next_double || 0,
                prev: s.previous_double || 0,
                outside: s.outside_hits || 0,
                other: s.other || 0
            },
            darts:
                (s.double_hits || 0) +
                (s.single_hits || 0) +
                (s.outside_hits || 0) +
                (s.next_double || 0) +
                (s.previous_double || 0) +
                (s.other || 0)
        };
    }

    if (type === "single_training") {
        return {
            number: s.single,
            type: "single",
            hits: {
                single: s.single_hits || 0,
                double: s.double_hits || 0,
                triple: s.triple_hits || 0,
                next: s.next_single || 0,
                prev: s.previous_single || 0,
                outside: s.outside_hits || 0,
                other: s.other || 0
            },
            darts:
                (s.single_hits || 0) +
                (s.double_hits || 0) +
                (s.triple_hits || 0) +
                (s.outside_hits || 0) +
                (s.next_single || 0) +
                (s.previous_single || 0) +
                (s.other || 0)
        };
    }

    if (type === "50-out") {
        return {
            type: "50-out",
            dartsUsed: s.darts_used || []
        };
    }

    if (type === "dartbot") {
        return {
                type: "dartbot",
                wonDarts: s.won_legs_number_of_darts || [],
                lostLegs: s.lost_legs || 0,
                avg: s["3_dart_average"] || null,
                first9: s["first_9_average"] || null,
                highestScore: s.highest_score || null,
                finishes: s.finishes || [],
                doubles: s.doubles || [], // <-- IMPORTANT
                thrown_per_double: s.thrown_per_double || {} // <-- IMPORTANT
            };
    }

    if (type === "round-the-board") {
        return {
            type: "round-the-board",

            dartsUpToBull: s.darts_up_to_bullseye ?? null,
            dartsAtBull: s.darts_thrown_at_bullseye ?? 0,
            dartsInSingleBull: s.darts_thrown_in_single_bull ?? null,

            // optional: raw arrays if you ever store them
            dartsPerNumber: s.darts_thrown_per_number || []
        };
    }

    return null;
}

function compute50OutStats(sessions) {
    const counts = {};
    const percentages = {};
    let total_count = 0;

    sessions.forEach(s => {
        if (s.type !== "50-out") return;

        (s.dartsUsed || []).forEach(d => {
            if (d === 0) {
                counts["not_finished"] = (counts["not_finished"] || 0) + 1;
            } else {
                counts[d] = (counts[d] || 0) + 1;
            }
            total_count += 1;
        });
    });

    // ✅ calculate percentages
    Object.keys(counts).forEach(k => {
        percentages[k] = total_count > 0
            ? (counts[k] / total_count) * 100
            : 0;
    });

    return {
        counts,
        percentages,
        total: total_count
    };
}
function computeDartbotStats(sessions) {
    const bots = sessions.filter(s => s.type === "dartbot");

    if (bots.length === 0) return null;

    let avgSum = 0;
    let first9Sum = 0;

    let highestAvg = 0;
    let highestFirst9 = 0;
    let highestScore = 0;
    let highestFinish = 0;

    let dartsWon = [];

    const doubleStats = {};

    bots.forEach(s => {
        if (s.avg) {
            avgSum += s.avg;
            highestAvg = Math.max(highestAvg, s.avg);
        }

        if (s.first9) {
            first9Sum += s.first9;
            highestFirst9 = Math.max(highestFirst9, s.first9);
        }

        if (s.highestScore) {
            highestScore = Math.max(highestScore, s.highestScore);
        }

        if (s.finishes && s.finishes.length > 0) {
            highestFinish = Math.max(highestFinish, ...s.finishes);
        }

        (s.wonDarts || []).forEach(d => dartsWon.push(d));

        // --- doubles aggregation ---
        const hitCounts = {};

        (s.doubles || []).forEach(d => {
            hitCounts[d] = (hitCounts[d] || 0) + 1;
        });

        if (s.thrown_per_double) {
            Object.keys(s.thrown_per_double).forEach(d => {
                const thrown = s.thrown_per_double[d] || 0;
                const hits = hitCounts[d] || 0;

                if (!doubleStats[d]) {
                    doubleStats[d] = { thrown: 0, hits: 0 };
                }

                doubleStats[d].thrown += thrown;
                doubleStats[d].hits += hits;
            });
        }
    });

    const avgDartsPerLeg = dartsWon.length
        ? dartsWon.reduce((a, b) => a + b, 0) / dartsWon.length
        : null;

    const minDartsPerLeg = dartsWon.length
        ? Math.min(...dartsWon)
        : null;

    // ✅ calculate hit percentages
    const doubleResults = {};

    Object.keys(doubleStats).forEach(d => {
        const entry = doubleStats[d];

        const hitPct = entry.thrown > 0
            ? (entry.hits / entry.thrown) * 100
            : 0;

        doubleResults[d] = {
            thrown: entry.thrown,
            hits: entry.hits,
            hitPct
        };
    });

    return {
        averageAverage: avgSum / bots.length,
        averageFirst9: first9Sum / bots.length,
        highestAverage: highestAvg,
        highestFirst9: highestFirst9,
        highestScore,
        highestFinish,
        avgDartsPerLeg,
        minDartsPerLeg,
        doubleResults // ✅ now included
    };
}

function computeRoundTheBoardStats(sessions) {
    const rounds = sessions.filter(s => s.type === "round-the-board");

    if (rounds.length === 0) {
        return { count: 0 };
    }

    let upToBullList = [];
    let bullList = [];
    let totalList = [];
    let singleBullPercentages = [];

    rounds.forEach(s => {
        let upToBull;
        upToBull = s.dartsUpToBull;
        const bull = s.dartsAtBull;

        if (upToBull != null) {
            upToBullList.push(upToBull);
        } else {
            const dartsPerNumber = s.dartsPerNumber;
            if (dartsPerNumber != null) {
                upToBull = dartsPerNumber.reduce((acc, val) => acc + val, 0);
                upToBullList.push(upToBull)
            }
        }

        bullList.push(bull);

        const total = (upToBull || 0) + bull;
        totalList.push(total);

        if (s.dartsInSingleBull != null && bull > 0) {
            singleBullPercentages.push((s.dartsInSingleBull / bull) * 100);
        }
    });

    const avg = arr => arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : null;
    const min = arr => arr.length ? Math.min(...arr) : null;

    return {
        count: rounds.length,

        avgUpToBull: avg(upToBullList),
        minUpToBull: min(upToBullList),

        avgBull: avg(bullList),
        minBull: min(bullList),

        avgTotal: avg(totalList),
        minTotal: min(totalList),

        avgSingleBullPct: singleBullPercentages.length
            ? avg(singleBullPercentages)
            : null
    };
}

function computeStats(sessions) {

    // existing logic for board modes
    const result = {};

    sessions.map(normalizeSession).forEach(s => {
        if (!s) return;
        if (s.type === "dartbot" || s.type === "50-out" || s.type === "round-the-board") return;

        const num = s.number;

        if (!result[num]) {
            result[num] = {
                attempts: 0,
                darts: 0,
                totalScore: 0,
                singleHits: 0,
                doubleHits: 0,
                tripleHits: 0,
                nextHits: 0,
                prevHits: 0,
                outsideHits: 0,
                otherHits: 0
            };
        }

        const r = result[num];
        const hits = s.hits;

        r.attempts += Object.values(hits).reduce((a, b) => a + b, 0);
        r.darts += s.darts;

        r.singleHits += hits.single || 0;
        r.doubleHits += hits.double || 0;
        r.tripleHits += hits.triple || 0;
        r.nextHits += hits.next || 0;
        r.prevHits += hits.prev || 0;
        r.outsideHits += hits.outside || 0;
        r.otherHits += hits.other || 0;

        if (s.type === "triple") {
            r.totalScore += computeTripleSessionScore(s);
        }
    });

    Object.keys(result).forEach(num => {
        const r = result[num];
        const total = r.attempts || 1;

        r["Single hit %"] = (r.singleHits / total) * 100;
        r["Double hit %"] = (r.doubleHits / total) * 100;
        r["Triple hit %"] = (r.tripleHits / total) * 100;
        r["Next hit %"] = (r.nextHits / total) * 100;
        r["Previous hit %"] = (r.prevHits / total) * 100;
        r["Outside hit %"] = (r.outsideHits / total) * 100;
        r["Other %"] = (r.otherHits / total) * 100;
        r["Average score"] = ((r.totalScore / total) * 3);
    });

    return result;
}

let mode = "single";

// --- CONFIG ---
const R = {
    doubleOuter: 200,
    doubleInner: 180,
    singleOuter: 180,
    tripleOuter: 130,
    tripleInner: 110,
    singleInner: 110,
    bullOuter: 30,
    bullInner: 12
};

// --- COLOR ---
function getValue(num) {
    const d = data[num];
    if (!d) return null;

    if (mode === "dartbot") return null; // 🚨 important

    if (mode === "single") return d["Single hit %"];
    if (mode === "double") return d["Double hit %"];
    if (mode === "triple") return d["Triple hit %"];

    return null;
}

function getColor(value) {
    if (value === null || value === undefined) return "#666";

    const max = getMaxValue();
    const ratio = value / max;

    // smoother gradient
    const green = Math.floor(255 * ratio);
    const red = Math.floor(255 * (1 - ratio));

    return `rgb(${red},${green},0)`;
}

// --- DRAW SEGMENT ---
function drawSegment(svg, startAngle, endAngle, rOuter, rInner, color, num) {
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");

    const x1 = Math.cos(startAngle) * rOuter;
    const y1 = Math.sin(startAngle) * rOuter;
    const x2 = Math.cos(endAngle) * rOuter;
    const y2 = Math.sin(endAngle) * rOuter;

    const x3 = Math.cos(endAngle) * rInner;
    const y3 = Math.sin(endAngle) * rInner;
    const x4 = Math.cos(startAngle) * rInner;
    const y4 = Math.sin(startAngle) * rInner;

    const d = `
        M ${x1} ${y1}
        A ${rOuter} ${rOuter} 0 0 1 ${x2} ${y2}
        L ${x3} ${y3}
        A ${rInner} ${rInner} 0 0 0 ${x4} ${y4}
        Z
    `;

    path.setAttribute("d", d);
    path.setAttribute("fill", color);
    path.setAttribute("stroke", "#111");
    path.setAttribute("cursor", "pointer");
    path.style.pointerEvents = "all";

    path.addEventListener("click", () => showDetails(num));

    svg.appendChild(path);
}

// --- DRAW BOARD --
function getMaxValue() {
    let max = 0;

    Object.keys(data).forEach(num => {
        const val = getValue(num);
        if (val !== null && val !== undefined) {
            if (val > max) max = val;
        }
    });

    return max || 1; // avoid division by 0
}
function getDartbotMax() {
    let max = 0;

    Object.values(data.dartbot || {}).forEach(r => {
        if (r && r.thrown > 0) {
            if (r.hitPct > max) max = r.hitPct;
        }
    });

    return max || 1;
}

function getDartbotColor(result) {
    if (!result || result.thrown === 0) return "#555";

    const max = getDartbotMax();
    const ratio = result.hitPct / max;

    // same gradient logic as other modes
    const green = Math.floor(255 * ratio);
    const red = Math.floor(255 * (1 - ratio));

    return `rgb(${red},${green},0)`;
}

function drawBoard() {
    const svg = document.getElementById("board");
    svg.innerHTML = ""; // 🔥 IMPORTANT: clear previous render

    const angleStep = 2 * Math.PI / 20;

    numbers.forEach((num, i) => {
        const offset = angleStep / 2;
        const start = i * angleStep - Math.PI / 2 - offset;
        const end = (i + 1) * angleStep - Math.PI / 2 - offset;

        let color;

        if (mode === "dartbot") {
            const result = data.dartbot?.[String(num)];
            color = getDartbotColor(result);
        } else {
            const value = getValue(num);
            color = getColor(value);
        }

        // FULL segment (center → double)
        drawFullSegment(svg, start, end, R.doubleOuter, color, num);

        // number label
        const angle = (start + end) / 2;
        const tx = Math.cos(angle) * 210;
        const ty = Math.sin(angle) * 210;

        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", tx);
        text.setAttribute("y", ty);
        text.setAttribute("fill", "white");
        text.setAttribute("font-size", "14");
        text.setAttribute("text-anchor", "middle");
        text.setAttribute("alignment-baseline", "middle");
        text.textContent = num;

        svg.appendChild(text);
    });

    // --- BULL (25) ---
    let bullColor;

    if (mode === "dartbot") {
        const result = data.dartbot?.["25"];
        bullColor = getDartbotColor(result);
    } else {
        const bullValue = (mode === "triple") ? null : getValue("25");
        bullColor = (mode === "triple") ? "#666" : getColor(bullValue);
    }

    const bullOuter = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    bullOuter.setAttribute("r", R.bullOuter);
    bullOuter.setAttribute("fill", mode === "triple" ? "#666" : bullColor);
    bullOuter.setAttribute("stroke", "#111");
    bullOuter.addEventListener("click", () => showDetails("25"));
    svg.appendChild(bullOuter);

    const bullInner = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    bullInner.setAttribute("r", R.bullInner);
    bullInner.setAttribute("fill", "#aa0000");
    bullInner.setAttribute("stroke", "#111");
    bullInner.addEventListener("click", () => showDetails("25"));
    svg.appendChild(bullInner);
}

function drawFullSegment(svg, startAngle, endAngle, radius, color, num) {
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");

    const x1 = Math.cos(startAngle) * radius;
    const y1 = Math.sin(startAngle) * radius;
    const x2 = Math.cos(endAngle) * radius;
    const y2 = Math.sin(endAngle) * radius;

    const d = `
        M 0 0
        L ${x1} ${y1}
        A ${radius} ${radius} 0 0 1 ${x2} ${y2}
        Z
    `;

    path.setAttribute("d", d);
    path.setAttribute("fill", color);
    path.setAttribute("stroke", "#111");

    path.addEventListener("click", () => showDetails(num));

    svg.appendChild(path);
}

// --- DETAILS ---
function showDetails(num) {
    const d = data[num];

    let html = `<h3>Number ${num}</h3>`;

    if (mode === "single") {
        if (!d) return;
        html += `
            <p>Single hit: ${d["Single hit %"].toFixed(2)}%</p>
            <p>Double hit: ${d["Double hit %"].toFixed(2)}%</p>
            <p>Triple hit: ${d["Triple hit %"].toFixed(2)}%</p>
            <p>Next: ${d["Next hit %"].toFixed(2)}%</p>
            <p>Previous: ${d["Previous hit %"].toFixed(2)}%</p>
            <p>Outside: ${d["Outside hit %"].toFixed(2)}%</p>
        `;
    }

    if (mode === "double") {
        if (!d) return;
        html += `
            <p>Double hit: ${d["Double hit %"].toFixed(2)}%</p>
            <p>Single hit: ${d["Single hit %"].toFixed(2)}%</p>
            <p>Outside: ${d["Outside hit %"].toFixed(2)}%</p>
            <p>Next: ${d["Next hit %"].toFixed(2)}%</p>
            <p>Previous: ${d["Previous hit %"].toFixed(2)}%</p>
        `;
    }

    if (mode === "triple") {
        if (!d) return;
        html += `
            <p>Triple hit: ${d["Triple hit %"].toFixed(2)}%</p>
            <p>Number hit: ${((d.tripleHits + d.doubleHits + d.singleHits) / d.attempts * 100).toFixed(2)}%</p>
            <p>Next: ${d["Next hit %"].toFixed(2)}%</p>
            <p>Previous: ${d["Previous hit %"].toFixed(2)}%</p>
            <p>Average score: ${d["Average score"].toFixed(2)}</p>
        `;
    }

    if (mode === "dartbot") {
        const dBot = data.dartbot?.[num];

        if (!dBot || dBot.thrown === 0) {
            html += `<p>No attempts for D${num}</p>`;
        } else {
            html += `
                <p><strong>Thrown:</strong> ${dBot.thrown}</p>
                <p><strong>Hits:</strong> ${dBot.hits}</p>
                <p><strong>Hit %:</strong> ${dBot.hitPct.toFixed(2)}%</p>
                <p><strong>Miss %:</strong> ${(100 - dBot.hitPct).toFixed(2)}%</p>
            `;
        }
    }

    document.getElementById("details").innerHTML = html;
}

// --- MODE ---
function setMode(newMode) {
    mode = newMode;

    document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
    document.getElementById(newMode + "Btn").classList.add("active");

    updateDescriptions();
    applyFilter(); // 🔥 recompute with correct dataset
}

function setDefaultDates() {
    const fromInput = document.getElementById("fromDate");
    const toInput = document.getElementById("toDate");

    if (!fromInput.value) fromInput.value = "2026-01-01";
    if (!toInput.value) toInput.value = new Date().toISOString().split("T")[0];
}

function updateDescriptions() {
    const modeDescriptions = {
        single: "Throw x darts at a single and track the hits and misses.",
        double: "Throw x darts at a double and track the hits and misses.",
        triple: "Throw x darts at a treble and track the hits and misses. The average score is also showed.",
        dartbot: "Analysis of doubles thrown and hit against the dartbot."
    };

    const el = document.getElementById("modeDescription");
    if (el) {
        el.textContent = modeDescriptions[mode] || "";
    }
}

function updateSectionDescriptions() {
    const roundDartbot = document.getElementById("dartbotDescription");
    if (roundDartbot) {
        roundDartbot.textContent =
            "Dartbot Stats contains data gathered from games against the dartbot.";
    }

    const roundDesc = document.getElementById("roundTheBoardDescription");
    if (roundDesc) {
        roundDesc.textContent =
            "Move from 1, counting up to 20 and finally bullseye. Double means skipping one, treble skipping two numbers.";
    }

    const fiftyDesc = document.getElementById("fiftyOutDescription");
    if (fiftyDesc) {
        fiftyDesc.textContent =
            "Start with a dart at the bullseye. Finish from there in at most 9 darts total.";
    }
}


window.addEventListener("DOMContentLoaded", () => {
    setDefaultDates();
    renderInputs();
    loadSessions();
});
